name: Build & Push Prod Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'ロールバック先の release tag (例: v1.0.0)。指定した場合はそのタグのイメージを latest-prod として再タグ付けします。'
        required: true

permissions:
  contents: read
  id-token: write  # WIF OIDC トークン発行に必要

env:
  PROJECT_ID: clearbag-prod
  REGION: asia-northeast1
  REPOSITORY_ID: school-agent-prod
  IMAGE_NAME: school-agent-v2

jobs:
  lint:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_lint-python.yml

  test:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_test-python.yml

  build-push:
    needs: [lint, test]
    # lint/test が成功、またはスキップ（ロールバック時）の場合に実行
    if: |
      always() &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: build-prod
      cancel-in-progress: false  # ビルド途中でキャンセルしない

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ---------------------------------------------------------------------------
      # 通常デプロイ (tag push): ビルド → SHA / release / latest-prod タグで push
      # ---------------------------------------------------------------------------

      - name: Compute image tags (normal deploy)
        if: github.event_name == 'push'
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push Docker image (normal deploy)
        if: github.event_name == 'push'
        uses: docker/build-push-action@471d1dc4e07e5cddb65df6f2d18a02e9e0666bc8 # v6.15.0
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.IMAGE_NAME }}:latest-prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------------------
      # ロールバック (workflow_dispatch): 既存イメージを latest-prod として再タグ付け
      # ---------------------------------------------------------------------------

      - name: Re-tag for rollback
        if: github.event_name == 'workflow_dispatch'
        run: |
          TARGET_TAG="${{ github.event.inputs.target_tag }}"
          BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.IMAGE_NAME }}"

          TARGET_URL="${BASE}:${TARGET_TAG}"
          LATEST_PROD_URL="${BASE}:latest-prod"

          # ロールバック先イメージの存在確認
          if ! gcloud artifacts docker images describe "${TARGET_URL}" --quiet 2>/dev/null; then
            echo "ERROR: イメージ ${TARGET_URL} が Artifact Registry に存在しません" >&2
            exit 1
          fi

          # 既存イメージを pull → latest-prod として push
          docker pull "${TARGET_URL}"
          docker tag "${TARGET_URL}" "${LATEST_PROD_URL}"
          docker push "${LATEST_PROD_URL}"

  notify:
    needs: [lint, test, build-push]
    if: always()
    uses: ./.github/workflows/_notify-slack.yml
    with:
      environment: prod
      workflow_name: "Build & Push Prod Image"
      result: ${{ needs.build-push.result }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
